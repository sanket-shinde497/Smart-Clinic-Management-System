# ? Static Resources
spring.web.resources.static-locations=classpath:/static/

# ? Thymeleaf Templates
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ===== Local development database (H2) =====
# Use in-memory H2 so the app can start without an external MySQL server.
spring.datasource.url=jdbc:h2:mem:cms;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable Mongo auto-configuration (remove if you actually need Mongo at runtime)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.mongo.MongoReactiveAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration

# API base path used in controller mappings (default for local dev)
api.path=/

# If you need production configuration, use profiles or external configuration. Example prod placeholders:
# spring.datasource.url=jdbc:mysql://your-production-host:3306/cms
# spring.datasource.username=prod_user
# spring.datasource.password=prod_password
# spring.data.mongodb.uri=${MONGO_URI:}

# If you use JWT in the app, provide a secret. This is a dev placeholder; replace with a strong secret in prod.
jwt.secret=dev_jwt_secret_change_me

# Dev-only: run the app on a non-conflicting port to avoid "port already in use" errors during development
server.port=8081
